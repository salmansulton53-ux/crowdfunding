<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crowdfunding Product Page</title>
<link rel="stylesheet" href="./style.css">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-[url('./images/image-hero-desktop.jpg')] bg-cover h-80">
  <nav class="flex justify-between items-center px-10 py-6 text-white">
    <h1 class="text-2xl font-bold">crowdfund</h1>
    <ul class="flex gap-6">
      <li>About</li>
      <li>Discover</li>
      <li>Get Started</li>
    </ul>
  </nav>
</header>

<main class="max-w-2xl mx-auto -mt-20 grid gap-y-6 px-4">

<section class="bg-white rounded-lg shadow p-8 text-center">
  <img src="./images/logo-mastercraft.svg" class="mx-auto -mt-16 mb-4">

  <h2 class="text-2xl font-bold mb-2">
    Mastercraft Bamboo Monitor Riser
  </h2>

  <p class="text-gray-500 mb-6">
    A beautiful handcrafted monitor stand to reduce neck and eye strain.
  </p>

  <div class="flex justify-between items-center">
    <button class="bg-[#3cb4ac] text-white px-6 py-3 rounded-full">
      Back this project
    </button>

    <button class="bg-gray-200 p-3 rounded-full md:flex md:p-0 md:px-0">
      <img src="./images/icon-bookmark.svg" alt="">
      <label class="hidden md:block px-10 p-4 font-bold text-center text-[#7a7a7a]">Bookmark</label>
    </button>
  </div>
</section>

<section class="bg-white rounded-lg shadow p-8">

  <div class="grid md:grid-cols-3 text-center gap-6">

    <div>
      <h3 class="text-2xl font-bold">$89,914</h3>
      <p class="text-gray-500">of $100,000 backed</p>
    </div>

    <div>
      <h3 class="text-2xl font-bold">5,007</h3>
      <p class="text-gray-500">total backers</p>
    </div>

    <div>
      <h3 class="text-2xl font-bold">56</h3>
      <p class="text-gray-500">days left</p>
    </div>

  </div>

  
</section>



</body>
</html>
